<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: #0a0a1a;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* 星空背景 */
        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 主容器 */
        .main-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 头像区域 */
        .avatar-section {
            margin-bottom: 30px;
            animation: fadeInDown 1s ease-out;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(100, 150, 255, 0.5);
            object-fit: cover;
            background: linear-gradient(135deg, #1a1a3a, #2a2a5a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        /* 头像占位符 */
        .avatar-placeholder {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(100, 150, 255, 0.5);
            background: linear-gradient(135deg, #1a1a3a, #2a2a5a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* 打字机效果 */
        .typewriter-section {
            margin-bottom: 20px;
            animation: fadeIn 1.5s ease-out;
        }

        .typewriter {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(100, 150, 255, 0.8);
            min-height: 60px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .typewriter-text {
            border-right: 3px solid #64a0ff;
            padding-right: 5px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { border-color: #64a0ff; }
            50% { border-color: transparent; }
        }

        /* 副标题 */
        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            animation: fadeInUp 1.5s ease-out;
            text-align: center;
            max-width: 500px;
            line-height: 1.6;
        }

        /* 标签 */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 40px;
            justify-content: center;
            animation: fadeIn 2s ease-out;
        }

        .tag {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
            transition: all 0.3s ease;
            cursor: default;
            backdrop-filter: blur(10px);
        }

        .tag:hover {
            background: rgba(100, 150, 255, 0.3);
            border-color: rgba(100, 150, 255, 0.6);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(100, 150, 255, 0.3);
        }

        /* 社交链接 */
        .social-links {
            display: flex;
            gap: 25px;
            animation: fadeInUp 2s ease-out;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            text-decoration: none;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .social-link:hover {
            background: rgba(100, 150, 255, 0.4);
            border-color: rgba(100, 150, 255, 0.7);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(100, 150, 255, 0.4);
            color: #ffffff;
        }

        /* 页脚 */
        .footer {
            position: fixed;
            bottom: 20px;
            z-index: 1;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            text-align: center;
        }

        /* 动画 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .typewriter {
                font-size: 1.8rem;
            }
            .subtitle {
                font-size: 1rem;
            }
            .avatar-placeholder,
            .avatar {
                width: 120px;
                height: 120px;
                font-size: 45px;
            }
            .tag {
                padding: 6px 16px;
                font-size: 0.85rem;
            }
            .social-link {
                width: 45px;
                height: 45px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 星空画布 -->
    <canvas id="stars-canvas"></canvas>

    <!-- 主容器 -->
    <div class="main-container">

        <div class="typewriter-section">
            <div class="typewriter">

        <div class="tags">

    </div>

    <!-- 页脚 -->
    <div class="footer">
        <p>© 2025 我的个人网站 | Powered by GitHub Pages</p>
    </div>

    <script>
        // ============================================
        // 星空背景
        // ============================================
        (function() {
            var canvas = document.getElementById('stars-canvas');
            var ctx = canvas.getContext('2d');
            var stars = [];
            var STAR_COUNT = 200;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function createStars() {
                stars = [];
                for (var i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        radius: Math.random() * 2 + 0.5,
                        opacity: Math.random(),
                        speed: Math.random() * 0.02 + 0.005,
                        direction: Math.random() > 0.5 ? 1 : -1
                    });
                }
            }

            function drawStars() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (var i = 0; i < stars.length; i++) {
                    var star = stars[i];

                    star.opacity += star.speed * star.direction;

                    if (star.opacity >= 1) {
                        star.direction = -1;
                    } else if (star.opacity <= 0.1) {
                        star.direction = 1;
                    }

                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, ' + star.opacity + ')';
                    ctx.fill();
                }

                requestAnimationFrame(drawStars);
            }

            resizeCanvas();
            createStars();
            drawStars();

            window.addEventListener('resize', function() {
                resizeCanvas();
                createStars();
            });
        })();

        // ============================================
        // 打字机效果
        // ============================================
        (function() {
            var targetElement = document.getElementById('typewriter-target');
            var fullText = '你的名字';
            var currentIndex = 0;
            var isDeleting = false;
            var typeSpeed = 150;
            var deleteSpeed = 80;
            var pauseDuration = 2000;
            var isWaiting = false;

            function typeWriter() {
                if (isWaiting) {
                    setTimeout(function() {
                        isWaiting = false;
                        isDeleting = true;
                        typeWriter();
                    }, pauseDuration);
                    return;
                }

                if (!isDeleting) {
                    if (currentIndex < fullText.length) {
                        targetElement.textContent = fullText.substring(0, currentIndex + 1);
                        currentIndex++;
                        setTimeout(typeWriter, typeSpeed);
                    } else {
                        isWaiting = true;
                        setTimeout(typeWriter, pauseDuration);
                    }
                } else {
                    if (currentIndex > 0) {
                        targetElement.textContent = fullText.substring(0, currentIndex - 1);
                        currentIndex--;
                        setTimeout(typeWriter, deleteSpeed);
                    } else {
                        isDeleting = false;
                        setTimeout(typeWriter, 500);
                    }
                }
            }

            if (targetElement) {
                typeWriter();
            }
        })();
    </script>
</body>
</html>
